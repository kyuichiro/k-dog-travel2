<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>質問2 | ワンちゃん旅行 タイプ診断システム</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="app-container">
        <section class="screen">

            <div class="glass-card quiz-card">
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 66.66666666666666%"></div>
                </div>
                <div class="question-header">
                    <span class="q-label">質問 <span>2</span></span>
                    <h2 class="question-title">ワンちゃんは、運動好きですか？</h2>
                    <p class="question-desc">普段の活動量・性格で選んでください</p>
                </div>
                <div class="options-grid">
                    <a href="q3-small-active.html" style="text-decoration:none; color:inherit;">
                        <div class="option-card">
                            <div class="option-title">すき（活発）</div>
                            <div class="option-desc">走ったり遊んだりするのが大好き</div>
                        </div>
                    </a>
                    <a href="q3-small-quiet.html" style="text-decoration:none; color:inherit;">
                        <div class="option-card">
                            <div class="option-title">きらい（おとなしい）</div>
                            <div class="option-desc">のんびり過ごすのが好き・おとなしいタイプ</div>
                        </div>
                    </a>
                </div>
                <a href="q1.html" class="text-btn" style="text-decoration:none; display:inline-block; margin-top:2rem;">前の質問に戻る</a>
            </div>
    
        </section>
    </div>
    <!-- Decorative background elements -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>
