<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>質問1 | ワンちゃん旅行 タイプ診断システム</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="app-container">
        <section class="screen">

            <div class="glass-card quiz-card">
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 33.33333333333333%"></div>
                </div>
                <div class="question-header">
                    <span class="q-label">質問 <span>1</span></span>
                    <h2 class="question-title">ワンちゃんの大きさは？</h2>
                    <p class="question-desc">体のサイズに合ったプランをご提案します</p>
                </div>
                <div class="options-grid">
                    <a href="q2-small.html" style="text-decoration:none; color:inherit;">
                        <div class="option-card">
                            <div class="option-title">中・小型犬</div>
                            <div class="option-desc">チワワ・トイプードル・柴犬など</div>
                        </div>
                    </a>
                    <a href="q2-large.html" style="text-decoration:none; color:inherit;">
                        <div class="option-card">
                            <div class="option-title">大型犬</div>
                            <div class="option-desc">体重おおむね25kg以上・ゴールデンレトリバーなど</div>
                        </div>
                    </a>
                </div>
                <a href="index.html" class="text-btn" style="text-decoration:none; display:inline-block; margin-top:2rem;">前の質問に戻る</a>
            </div>
    
        </section>
    </div>
    <!-- Decorative background elements -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>
</body>
</html>
