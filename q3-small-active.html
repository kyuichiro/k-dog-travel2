<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>質問3 | ワンちゃん旅行 タイプ診断システム</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="app-container">
        <section class="screen">

            <div class="glass-card quiz-card">
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 100.0%"></div>
                </div>
                <div class="question-header">
                    <span class="q-label">質問 <span>3</span></span>
                    <h2 class="question-title">ワンちゃんは、人見知り・ワンちゃん見知りをしますか？</h2>
                    <p class="question-desc">他の人や犬に対する反応で選んでください</p>
                </div>
                <div class="options-grid">
                    <a href="result-small-active-introvert.html" style="text-decoration:none; color:inherit;">
                        <div class="option-card">
                            <div class="option-title">する（内向的）</div>
                            <div class="option-desc">他の人や犬に緊張したり警戒しがち</div>
                        </div>
                    </a>
                    <a href="result-small-active-extrovert.html" style="text-decoration:none; color:inherit;">
                        <div class="option-card">
                            <div class="option-title">しない（外向的）</div>
                            <div class="option-desc">誰とでもすぐ仲良くなれる人懐っこいタイプ</div>
                        </div>
                    </a>
                </div>
                <a href="q2-small.html" class="text-btn" style="text-decoration:none; display:inline-block; margin-top:2rem;">前の質問に戻る</a>
            </div>
    
        </section>
    </div>
    <!-- Decorative background elements -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>
</body>
</html>
